<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>nitpickr – Twitter Card</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 628px;
      overflow: hidden;
      font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      display: flex;
      align-items: center;
    }

    .card {
      width: 1200px;
      height: 628px;
      background: #fff;
      border: 1px solid #e8e6e0;
      display: flex;
      align-items: center;
      padding: 0 48px;
      gap: 48px;
      position: relative;
    }

    /* subtle top accent bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: #7C3AED;
    }

    .icon-wrap {
      flex-shrink: 0;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-wrap svg {
      width: 200px;
      height: 200px;
    }

    .divider {
      width: 1px;
      height: 260px;
      background: #e8e6e0;
      flex-shrink: 0;
    }

    .text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .eyebrow {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7C3AED;
      font-family: ui-monospace, Consolas, monospace;
    }

    h1 {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -3px;
      color: #0f0e0b;
      line-height: 1.0;
    }

    h1 span {
      color: #7C3AED;
    }

    p {
      font-size: 30px;
      color: #6b7280;
      line-height: 1.5;
      max-width: 640px;
    }

    .brand {
      position: absolute;
      bottom: 28px;
      right: 48px;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #0f0e0b;
      font-family: ui-monospace, Consolas, monospace;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 130 135" xmlns="http://www.w3.org/2000/svg">
        <circle cx="62" cy="62" r="50" fill="none" stroke="#141413" stroke-width="8"/>
        <line x1="99" y1="99" x2="118" y2="118" stroke="#141413" stroke-width="10" stroke-linecap="round"/>
        <ellipse cx="62" cy="66" rx="18" ry="22" fill="#7C3AED"/>
        <circle cx="62" cy="42" r="13" fill="#7C3AED"/>
        <circle cx="55" cy="39" r="4" fill="white"/>
        <circle cx="69" cy="39" r="4" fill="white"/>
        <circle cx="55.8" cy="39.5" r="2" fill="#4c1d95"/>
        <circle cx="69.8" cy="39.5" r="2" fill="#4c1d95"/>
        <line x1="57" y1="30" x2="47" y2="18" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="67" y1="30" x2="77" y2="18" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="47" cy="17" r="4" fill="#7C3AED"/>
        <circle cx="77" cy="17" r="4" fill="#7C3AED"/>
        <line x1="46" y1="60" x2="78" y2="60" stroke="white" stroke-width="2"/>
        <line x1="45" y1="71" x2="79" y2="71" stroke="white" stroke-width="2"/>
        <line x1="44" y1="55" x2="28" y2="47" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="44" y1="66" x2="26" y2="64" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="44" y1="77" x2="28" y2="85" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="80" y1="55" x2="96" y2="47" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="80" y1="66" x2="98" y2="64" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="80" y1="77" x2="96" y2="85" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="divider"></div>

    <div class="text">
      <span class="eyebrow">nitpickr</span>
      <h1>Real feedback from<br><span>real indie developers.</span></h1>
      <p>Post your app. Give feedback on others. Get honest, actionable feedback in return.</p>
    </div>

    <div class="brand">nitpickr.dev</div>
  </div>
</body>
</html>
